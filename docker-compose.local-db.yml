services:
  hrm-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hrm-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "HrmLocalDb@2026"
    ports:
      - "14333:1433"
    volumes:
      - hrm_sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'HrmLocalDb@2026' -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  hrm-redis:
    image: redis:7-alpine
    container_name: hrm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  hrm_sqlserver_data:
